name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android platform files
        run: flutter create --platforms=android --project-name private_shield_ultimate --org com.privateshield .

      - name: Remove default Flutter test
        run: rm -rf test

      - name: Apply Android permissions manifest
        run: cp android_templates/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze lib

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivateShield-Ultimate-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
